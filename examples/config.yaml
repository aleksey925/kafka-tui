# kafka-tui config.yaml — UI behavior, columns, integrations.
#
# Two layers are merged at startup (lowest priority first):
#   1. Global  — ~/.kafka-tui/config.yaml
#   2. Project — <repo>/.kafka-tui/config.yaml (located by walking up from cwd)
#
# Scalars in the project layer override global; lists are replaced wholesale.
# Use `:config sources` inside the TUI to inspect where each field came from.
#
# Any string value can use ${env:VAR}, ${file:/path}, or ${vault:path#key} placeholders
# (except vault.address / vault.token, which cannot reference ${vault:...} themselves).

logging:
  # one of: debug | info | warn | error
  level: info
  file: ~/.kafka-tui/kafka-tui.log
  max_size_mb: 10
  max_files: 5

topics:
  # available keys: name, partitions, replicas, messages, size,
  # cleanup_policy, retention_ms, min_isr
  # order in the list = column order on screen; omitted keys are hidden
  columns: [name, partitions, replicas, cleanup_policy, messages, size]

groups:
  # available keys: state, name, coordinator, protocol, members, total_lag
  columns: [state, name, coordinator, protocol, members, total_lag]

messages:
  # available keys: timestamp, partition, offset, key, value, headers
  columns: [timestamp, partition, offset, key, headers, value]

produce:
  # default compression for the dropdown: none | gzip | snappy | lz4 | zstd
  default_compression: none

clipboard:
  # auto = native + osc52 in parallel; native uses pbcopy / xclip / wl-copy
  method: auto

# vault: applies to the whole section — only required when ${vault:...}
# placeholders appear in any config file.
vault:
  # address resolution: --vault-addr CLI flag → this field
  address: https://vault.example.com
  # token resolution: --vault-token CLI flag → this field → $VAULT_TOKEN → ~/.vault-token → error
  token: ${env:VAULT_TOKEN:-}
