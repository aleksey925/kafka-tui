version: 2

project_name: kafka-tui

builds:
  - id: kafka-tui
    main: ./cmd/kafka-tui
    binary: kafka-tui
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.ver={{.Version}}

archives:
  - id: kafka-tui
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

brews:
  - name: kafka-tui
    repository:
      owner: aleksey925
      name: homebrew-apps
      branch: master
    directory: Formula
    commit_author:
      name: Aleksey Petrunnik
      email: petrunnik.a@gmail.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/aleksey925/kafka-tui"
    description: "k9s-style terminal UI to browse, manage, and configure Apache Kafka"
    license: "MIT"
    caveats: |
      If you previously installed kafka-tui manually (e.g. to ~/.local/bin),
      remove that copy to avoid PATH conflicts:
        rm ~/.local/bin/kafka-tui

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: aleksey925
    name: kafka-tui
  draft: false
  prerelease: auto
