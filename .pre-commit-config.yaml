repos:
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: helm|helmfile.yaml
      - id: detect-private-key
      - id: check-yaml
        exclude: helm|helmfile.yaml

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args: [-formatter, retain_line_breaks_single=true]
        exclude: helm|helmfile.yaml

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: prettier --write
        files: ^README\.md$

      - id: gofmt
        name: gofmt
        entry: gofmt -s -w
        language: system
        types: [go]
        exclude: ^(vendor|.cache|.go)/

      - id: go-vet
        name: go vet
        entry: go vet
        args: ["./..."]
        language: system
        pass_filenames: false
        always_run: true

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        args: ["./..."]
        language: system
        pass_filenames: false
        always_run: true
